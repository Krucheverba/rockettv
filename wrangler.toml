# Cloudflare Workers — конфиг для деплоя статики через Workers Static Assets.
# Этот режим работает без Worker-скрипта: Cloudflare сам отдаёт файлы из корня
# и возвращает /404.html для несуществующих путей.
#
# Локальный деплой:
#   npx wrangler login
#   npx wrangler deploy
#
# Документация: https://developers.cloudflare.com/workers/static-assets/

name = "rockettv"
compatibility_date = "2025-09-23"

[assets]
directory = "./"
not_found_handling = "404-page"
