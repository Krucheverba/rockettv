<!doctype html>

<link rel="stylesheet" href="/styles.css" />
<style>

  }
  .nf__code{
    font-family:'JetBrains Mono',monospace;
    font-size:clamp(80px,16vw,180px);
    line-height:1;font-weight:800;
    background:linear-gradient(90deg,#FFD23F 0%, #FF5C8A 50%, #6EE7F9 100%);

  }
  .nf p{color:#B6BDD0;max-width:48ch;margin:0 auto 28px}

<body>

    <div>

      <p>Возможно, ссылка устарела. Вернитесь на главную — там лендинг RDDU-1 и форма заявки.</p>
      <a class="btn btn--primary" href="/">На главную</a>
